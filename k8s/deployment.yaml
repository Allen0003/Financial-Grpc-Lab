apiVersion: v1
kind: Service
metadata:
  name: grpc-server-headless
  namespace: default
spec:
  clusterIP: None # 關鍵：宣告為 Headless Service，停用 ClusterIP
  selector:
    app: grpc-server
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-server-deployment
  namespace: default
spec:
  replicas: 3 # 3 個 Server Pod 副本
  selector:
    matchLabels:
      app: grpc-server
  template:
    metadata:
      labels:
        app: grpc-server
    spec:
      containers:
        - name: grpc-server
          image: financial-grpc-server:v1 # 填入您的鏡像庫路徑
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-client-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-client
  template:
    metadata:
      labels:
        app: grpc-client
    spec:
      containers:
        - name: grpc-client
          image: financial-grpc-client:v1 # 填入您的鏡像庫路徑
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: grpc-client-service
  namespace: default
spec:
  type: NodePort # 方便外部調用與測試 Client
  selector:
    app: grpc-client
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080